<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exata Falada - Conversor PDF</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-container" class="container">
        <h1 class="logo">Exata <span>Falada</span></h1>
        <h2>Acesso ao Sistema</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="primary-btn">Entrar</button>
            <p id="login-error" class="error-msg"></p>
        </form>
    </div>

    <div id="app-container" class="container hidden">
        <header class="app-header">
            <h1 class="logo">Exata <span>Falada</span></h1>
            <div class="user-info">
                <span id="user-display"></span>
                <button id="logout-btn" class="secondary-btn">Sair</button>
            </div>
        </header>

        <main>
            <section class="upload-section">
                <h2>Converter PDF para HTML</h2>
                <form id="upload-form">
                    <div class="file-drop-area">
                        <span class="file-message">Arraste seu PDF aqui ou clique para selecionar</span>
                        <input type="file" id="pdf-file" accept="application/pdf" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="pages">Páginas (opcional)</label>
                        <input type="text" id="pages" placeholder="Ex: 1, 3-5, 12">
                        <small>Deixe em branco para todas as páginas</small>
                    </div>
                    
                    <button type="submit" id="convert-btn" class="primary-btn">Iniciar Conversão</button>
                </form>
            </section>

            <section id="progress-section" class="progress-section hidden">
                <div class="progress-header">
                    <h3>Progresso da Conversão</h3>
                    <span id="status-badge" class="badge badge-processing">Processando</span>
                </div>
                
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
                </div>
                <div class="progress-text">
                    <span id="progress-percentage">0%</span>
                </div>

                <div class="terminal-container">
                    <div class="terminal-header">
                        <span>Terminal Output</span>
                    </div>
                    <textarea id="terminal-logs" readonly></textarea>
                </div>

                <div id="download-container" class="download-container hidden">
                    <button id="download-btn" class="success-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Baixar HTML Gerado
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
